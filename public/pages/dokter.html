<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul Dokter - SIMRS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<nav class="navbar navbar-dark" style="background-color:#1a5276;">
    <div class="container">
        <span class="navbar-brand">🩺 Modul Dokter</span>
        <a href="../index.html" class="text-white text-decoration-none">← Dashboard</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Statistik -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h6 class="text-muted">Total Dokter</h6>
                    <h2 id="totalDokter">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-success">
                <div class="card-body">
                    <h6 class="text-muted">Aktif</h6>
                    <h2 id="totalAktif" class="text-success">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-danger">
                <div class="card-body">
                    <h6 class="text-muted">Tidak Aktif</h6>
                    <h2 id="totalTidakAktif" class="text-danger">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <strong id="judulForm">Tambah Dokter</strong>
        </div>
        <div class="card-body">
            <form id="formDokter">
                <input type="hidden" id="dokterId">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nama Dokter</label>
                        <input type="text" class="form-control" id="nama_dokter"
                               placeholder="cth: dr. Budi Santoso" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">No STR</label>
                        <input type="text" class="form-control" id="no_str"
                               placeholder="cth: STR-001-2024" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Spesialisasi</label>
                        <select class="form-control" id="spesialisasi" required>
                            <option value="">-- Pilih Spesialisasi --</option>
                            <option value="Umum">Umum</option>
                            <option value="Anak">Anak</option>
                            <option value="Bedah">Bedah</option>
                            <option value="Penyakit Dalam">Penyakit Dalam</option>
                            <option value="Kandungan">Kandungan</option>
                            <option value="Jantung">Jantung</option>
                            <option value="Saraf">Saraf</option>
                            <option value="Mata">Mata</option>
                            <option value="THT">THT</option>
                            <option value="Kulit">Kulit</option>
                            <option value="Gigi">Gigi</option>
                            <option value="Jiwa">Jiwa</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-control" id="status" required>
                            <option value="Aktif">Aktif</option>
                            <option value="Tidak Aktif">Tidak Aktif</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">No Telp</label>
                        <input type="text" class="form-control" id="no_telp"
                               placeholder="cth: 081234567890" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email"
                               placeholder="cth: dokter@simrs.com" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="btnSubmit">Simpan</button>
                <button type="button" class="btn btn-secondary" id="btnReset">Reset</button>
            </form>
        </div>
    </div>

    <!-- Tabel -->
    <div class="card">
        <div class="card-header">
            <strong>Daftar Dokter</strong>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nama Dokter</th>
                            <th>No STR</th>
                            <th>Spesialisasi</th>
                            <th>No Telp</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableDokter">
                        <tr><td colspan="8" class="text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const API_URL = 'http://localhost/Sistem-Informasi-Manajemen-Rumah-Sakit/public/api/dokter';

    function badgeStatus(status) {
        return status === 'Aktif'
            ? '<span class="badge bg-success">Aktif</span>'
            : '<span class="badge bg-danger">Tidak Aktif</span>';
    }

    function loadData() {
        $.ajax({
            url: API_URL,
            method: 'GET',
            success: function(response) {
                const data = response.data;
                let html = '';
                let aktif = 0, tidakAktif = 0;

                data.forEach(function(item) {
                    if (item.status === 'Aktif') aktif++;
                    else tidakAktif++;

                    html += `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.nama_dokter}</td>
                            <td><code>${item.no_str}</code></td>
                            <td>${item.spesialisasi}</td>
                            <td>${item.no_telp}</td>
                            <td>${item.email}</td>
                            <td>${badgeStatus(item.status)}</td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1"
                                        onclick="editData(${item.id})">Edit</button>
                                <button class="btn btn-sm btn-danger"
                                        onclick="deleteData(${item.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                });

                $('#tableDokter').html(html || '<tr><td colspan="8" class="text-center">Belum ada data</td></tr>');
                $('#totalDokter').text(data.length);
                $('#totalAktif').text(aktif);
                $('#totalTidakAktif').text(tidakAktif);
            },
            error: function() {
                $('#tableDokter').html('<tr><td colspan="8" class="text-center text-danger">Gagal memuat data.</td></tr>');
            }
        });
    }

    $('#formDokter').submit(function(e) {
        e.preventDefault();

        const id = $('#dokterId').val();
        const data = {
            nama_dokter:  $('#nama_dokter').val(),
            no_str:       $('#no_str').val(),
            spesialisasi: $('#spesialisasi').val(),
            no_telp:      $('#no_telp').val(),
            email:        $('#email').val(),
            status:       $('#status').val()
        };

        const method = id ? 'PUT' : 'POST';
        const url    = id ? `${API_URL}/${id}` : API_URL;

        $.ajax({
            url: url,
            method: method,
            data: data,
            success: function(response) {
                alert(response.message);
                resetForm();
                loadData();
            },
            error: function(xhr) {
                const errors = xhr.responseJSON.errors;
                if (errors) {
                    let msg = 'Validasi gagal:\n';
                    Object.values(errors).forEach(e => msg += '- ' + e[0] + '\n');
                    alert(msg);
                } else {
                    alert('Error: ' + xhr.responseJSON.message);
                }
            }
        });
    });

    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'GET',
            success: function(response) {
                const d = response.data;
                $('#dokterId').val(d.id);
                $('#nama_dokter').val(d.nama_dokter);
                $('#no_str').val(d.no_str);
                $('#spesialisasi').val(d.spesialisasi);
                $('#no_telp').val(d.no_telp);
                $('#email').val(d.email);
                $('#status').val(d.status);
                $('#btnSubmit').text('Update');
                $('#judulForm').text('Edit Dokter');
                window.scrollTo(0, 0);
            }
        });
    }

    function deleteData(id) {
        if (confirm('Yakin ingin menghapus data dokter ini?')) {
            $.ajax({
                url: `${API_URL}/${id}`,
                method: 'DELETE',
                success: function(response) {
                    alert(response.message);
                    loadData();
                }
            });
        }
    }

    function resetForm() {
        $('#formDokter')[0].reset();
        $('#dokterId').val('');
        $('#btnSubmit').text('Simpan');
        $('#judulForm').text('Tambah Dokter');
    }

    $('#btnReset').click(resetForm);

    $(document).ready(function() {
        loadData();
    });
</script>

</body>
</html>
