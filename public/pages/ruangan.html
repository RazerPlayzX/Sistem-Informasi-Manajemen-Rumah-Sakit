<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul Ruangan - SIMRS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<nav class="navbar navbar-dark" style="background-color:#1a5276;">
    <div class="container">
        <span class="navbar-brand">🏥 Modul Ruangan</span>
        <a href="../index.html" class="text-white text-decoration-none">← Dashboard</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Statistik -->
    <div class="row mb-4" id="statistik">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h6 class="text-muted">Total Ruangan</h6>
                    <h2 id="totalRuangan">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-success">
                <div class="card-body">
                    <h6 class="text-muted">Tersedia</h6>
                    <h2 id="totalTersedia" class="text-success">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center border-danger">
                <div class="card-body">
                    <h6 class="text-muted">Penuh / Maintenance</h6>
                    <h2 id="totalTidakTersedia" class="text-danger">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Form -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            <strong id="judulForm">Tambah Ruangan</strong>
        </div>
        <div class="card-body">
            <form id="formRuangan">
                <input type="hidden" id="ruanganId">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nama Ruangan</label>
                        <input type="text" class="form-control" id="nama_ruangan" 
                               placeholder="cth: Ruang Mawar" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kode Ruangan</label>
                        <input type="text" class="form-control" id="kode_ruangan" 
                               placeholder="cth: R-001" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Jenis Ruangan</label>
                        <select class="form-control" id="jenis_ruangan" required>
                            <option value="">-- Pilih Jenis --</option>
                            <option value="ICU">ICU</option>
                            <option value="VIP">VIP</option>
                            <option value="Kelas 1">Kelas 1</option>
                            <option value="Kelas 2">Kelas 2</option>
                            <option value="Kelas 3">Kelas 3</option>
                            <option value="UGD">UGD</option>
                            <option value="OK">OK (Ruang Operasi)</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-control" id="status" required>
                            <option value="Tersedia">Tersedia</option>
                            <option value="Penuh">Penuh</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kapasitas (Tempat Tidur)</label>
                        <input type="number" class="form-control" id="kapasitas" 
                               min="1" placeholder="cth: 4" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Terisi</label>
                        <input type="number" class="form-control" id="terisi" 
                               min="0" value="0" required>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">Keterangan</label>
                        <textarea class="form-control" id="keterangan" 
                                  rows="2" placeholder="Catatan tambahan (opsional)"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="btnSubmit">
                    Simpan
                </button>
                <button type="button" class="btn btn-secondary" id="btnReset">
                    Reset
                </button>
            </form>
        </div>
    </div>

    <!-- Tabel -->
    <div class="card">
        <div class="card-header">
            <strong>Daftar Ruangan</strong>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nama Ruangan</th>
                            <th>Kode</th>
                            <th>Jenis</th>
                            <th>Kapasitas</th>
                            <th>Terisi</th>
                            <th>Status</th>
                            <th>Keterangan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableRuangan">
                        <tr><td colspan="9" class="text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const API_URL = 'http://localhost/Sistem-Informasi-Manajemen-Rumah-Sakit/public/api/ruangans';

    // Badge warna sesuai status
    function badgeStatus(status) {
        const map = {
            'Tersedia':    'badge bg-success',
            'Penuh':       'badge bg-danger',
            'Maintenance': 'badge bg-warning text-dark'
        };
        return `<span class="${map[status] || 'badge bg-secondary'}">${status}</span>`;
    }

    // Load semua data
    function loadData() {
        $.ajax({
            url: API_URL,
            method: 'GET',
            success: function(response) {
                const data = response.data;
                let html = '';

                // Hitung statistik
                let tersedia = 0, tidakTersedia = 0;
                data.forEach(function(item) {
                    if (item.status === 'Tersedia') tersedia++;
                    else tidakTersedia++;

                    html += `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.nama_ruangan}</td>
                            <td><code>${item.kode_ruangan}</code></td>
                            <td>${item.jenis_ruangan}</td>
                            <td>${item.kapasitas}</td>
                            <td>${item.terisi} / ${item.kapasitas}</td>
                            <td>${badgeStatus(item.status)}</td>
                            <td>${item.keterangan || '-'}</td>
                            <td>
                                <button class="btn btn-sm btn-warning me-1" 
                                        onclick="editData(${item.id})">Edit</button>
                                <button class="btn btn-sm btn-danger" 
                                        onclick="deleteData(${item.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                });

                $('#tableRuangan').html(html || '<tr><td colspan="9" class="text-center">Belum ada data</td></tr>');
                $('#totalRuangan').text(data.length);
                $('#totalTersedia').text(tersedia);
                $('#totalTidakTersedia').text(tidakTersedia);
            },
            error: function() {
                $('#tableRuangan').html('<tr><td colspan="9" class="text-center text-danger">Gagal memuat data. Pastikan server Laravel berjalan.</td></tr>');
            }
        });
    }

    // Submit form (Create / Update)
    $('#formRuangan').submit(function(e) {
        e.preventDefault();

        const id = $('#ruanganId').val();
        const data = {
            nama_ruangan:  $('#nama_ruangan').val(),
            kode_ruangan:  $('#kode_ruangan').val(),
            jenis_ruangan: $('#jenis_ruangan').val(),
            kapasitas:     $('#kapasitas').val(),
            terisi:        $('#terisi').val(),
            status:        $('#status').val(),
            keterangan:    $('#keterangan').val()
        };

        const method = id ? 'PUT' : 'POST';
        const url    = id ? `${API_URL}/${id}` : API_URL;

        $.ajax({
            url: url,
            method: method,
            data: data,
            success: function(response) {
                alert(response.message);
                resetForm();
                loadData();
            },
            error: function(xhr) {
                const errors = xhr.responseJSON.errors;
                if (errors) {
                    let msg = 'Validasi gagal:\n';
                    Object.values(errors).forEach(e => msg += '- ' + e[0] + '\n');
                    alert(msg);
                } else {
                    alert('Error: ' + xhr.responseJSON.message);
                }
            }
        });
    });

    // Isi form untuk edit
    function editData(id) {
        $.ajax({
            url: `${API_URL}/${id}`,
            method: 'GET',
            success: function(response) {
                const d = response.data;
                $('#ruanganId').val(d.id);
                $('#nama_ruangan').val(d.nama_ruangan);
                $('#kode_ruangan').val(d.kode_ruangan);
                $('#jenis_ruangan').val(d.jenis_ruangan);
                $('#kapasitas').val(d.kapasitas);
                $('#terisi').val(d.terisi);
                $('#status').val(d.status);
                $('#keterangan').val(d.keterangan);
                $('#btnSubmit').text('Update');
                $('#judulForm').text('Edit Ruangan');
                window.scrollTo(0, 0);
            }
        });
    }

    // Hapus data
    function deleteData(id) {
        if (confirm('Yakin ingin menghapus ruangan ini?')) {
            $.ajax({
                url: `${API_URL}/${id}`,
                method: 'DELETE',
                success: function(response) {
                    alert(response.message);
                    loadData();
                }
            });
        }
    }

    // Reset form
    function resetForm() {
        $('#formRuangan')[0].reset();
        $('#ruanganId').val('');
        $('#terisi').val('0');
        $('#btnSubmit').text('Simpan');
        $('#judulForm').text('Tambah Ruangan');
    }

    $('#btnReset').click(resetForm);

    // Jalankan saat halaman dibuka
    $(document).ready(function() {
        loadData();
    });
</script>

</body>
</html>
